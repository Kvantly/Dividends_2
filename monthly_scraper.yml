name: Monthly Oslo Stock Scraper

on:
  schedule:
    # Runs at 00:00 UTC on the 1st day of every month
    - cron: '0 0 1 * *'
  
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install selenium
    
    - name: Set up Chrome
      uses: browser-actions/setup-chrome@v1
      with:
        chrome-version: stable
    
    - name: Install ChromeDriver
      uses: nanasess/setup-chromedriver@v2
    
    - name: Run scraper
      run: python scrape_stocks.py
      continue-on-error: true
    
    - name: Check if files were created
      id: check_files
      run: |
        if [ -f "oslo_stocks.json" ] && [ -f "oslo_stocks.csv" ]; then
          echo "files_exist=true" >> $GITHUB_OUTPUT
          echo "✅ Output files created successfully"
          ls -lh oslo_stocks.json oslo_stocks.csv
        else
          echo "files_exist=false" >> $GITHUB_OUTPUT
          echo "❌ Output files were not created"
          echo "This usually means no data was scraped from the website"
        fi
    
    - name: Commit and push if changes
      if: steps.check_files.outputs.files_exist == 'true'
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add oslo_stocks.json oslo_stocks.csv
        git diff --quiet && git diff --staged --quiet || (git commit -m "Update Oslo stocks data - $(date +'%Y-%m-%d')" && git push)
    
    - name: Upload artifacts (for debugging)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: scraper-output
        path: |
          oslo_stocks.json
          oslo_stocks.csv
        if-no-files-found: ignore
