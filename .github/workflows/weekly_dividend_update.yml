name: Weekly Dividend Data Update

on:
  schedule:
    - cron: '0 3 * * 1'  # Mondays at 3 AM UTC (1 hour after price data update)
  workflow_dispatch:

jobs:
  update-dividends:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas

      - name: Check for stock list
        run: |
          if [ ! -f "oslo_stocks.json" ]; then
            echo "Error: oslo_stocks.json not found!"
            exit 1
          fi
          echo "Stock list found: $(python -c "import json; print(len(json.load(open('oslo_stocks.json'))))" ) stocks"

      - name: Fetch dividend data
        run: |
          echo "Starting dividend fetch..."
          python fetch_dividend_data.py

      - name: Verify output
        run: |
          COUNT=$(ls dividends-app/public/dividends/ | wc -l)
          echo "Dividend files generated: $COUNT"
          if [ "$COUNT" -lt 10 ]; then
            echo "Error: too few dividend files generated"
            exit 1
          fi

      - name: Commit and push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add dividends-app/public/dividends/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Weekly dividend data update - $(date +'%Y-%m-%d')"
            git push
            echo "Pushed successfully"
          fi
