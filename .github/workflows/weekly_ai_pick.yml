name: Weekly AI Stock Pick

on:
  schedule:
    - cron: '0 6 * * 0'   # Every Sunday at 06:00 UTC
  workflow_dispatch:        # Allow manual trigger for testing

jobs:
  ai-pick:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic

      - name: Generate weekly AI pick
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python weekly_ai_pick.py

      - name: Commit recommendation
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dividends-app/public/ai_pick.json
          git diff --cached --quiet || git commit -m "chore: weekly AI stock pick $(date +%Y-W%V)"
          git push
