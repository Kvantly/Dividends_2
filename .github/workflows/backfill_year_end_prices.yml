name: Backfill Year-End Prices

on:
  workflow_dispatch:

jobs:
  backfill:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas

      - name: Backfill year-end prices into dividend files
        run: python backfill_year_end_prices.py

      - name: Recalculate rankings with yield data
        run: python calculate_rankings.py

      - name: Commit updated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dividends-app/public/dividends/ dividends-app/public/rankings/
          git diff --cached --quiet || git commit -m "chore: backfill year-end prices and recalculate rankings"
          git push
